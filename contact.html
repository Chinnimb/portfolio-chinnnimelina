const ServiceCard = ({ icon, label, desc, color, process: steps, index }) => {

        background: "var(--paper)",
        borderRadius: 20,
        height: "100%",
        border: `1px solid ${open ? color : "rgba(43,36,32,0.07)"}`,
        transition: "border-color 0.25s, box-shadow 0.25s, transform 0.2s",
        boxShadow: open ? `0 12px 40px -10px rgba(43,36,32,0.13)` : "0 2px 16px -6px rgba(43,36,32,0.07)",
        position: "relative", overflow: "hidden",
        transform: open ? "translateY(-2px)" : "",
      }}>
        {/* accent bar */}

        {/* header — always visible, clickable */}
        <button
          onClick={() => setOpen(o => !o)}
          style={{
            width: "100%", textAlign: "left", background: "none", border: "none",
            cursor: "pointer", padding: "28px 28px 24px", display: "flex", flexDirection: "column", gap: 12,

              display: "flex", alignItems: "center", gap: 6,
            }}>
              {open ? "cerrar" : "ver proceso"}
              <span style={{ display: "inline-block", transform: open ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.25s", fontSize: 13 }}>↓</span>

          <p style={{ fontSize: 15, color: "var(--ink-soft)", lineHeight: 1.6, margin: 0 }}>{desc}</p>
        </button>

        {/* expandable process */}
        <div style={{
          maxHeight: open ? 500 : 0,
          overflow: "hidden",
          transition: "max-height 0.4s cubic-bezier(0.4,0,0.2,1)",
        }}>
          <div style={{
            padding: "0 28px 28px",
            borderTop: `1px solid rgba(43,36,32,0.08)`,
            paddingTop: 20,
          }}>
            <div className="mono" style={{ fontSize: 10, color: color, letterSpacing: "0.12em", marginBottom: 16 }}>— MI PROCESO</div>

              {steps.map(({ step, title, body }) => (
                <div key={step} style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>

                    fontFamily: "var(--font-hand)", fontSize: 22, color: color, opacity: 0.6,
