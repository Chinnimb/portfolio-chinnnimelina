<!doctype html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/shared.css">
</head>
<body data-palette="niebla" data-fonts="default">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/i18n.jsx"></script>
<script type="text/babel" src="assets/components.jsx"></script>

<script type="text/babel">
const data = {
  num: "03",
  year: "2024",
  title: "Dashboard SaaS",
  subtitle: "B2B · gestión de proyectos",
  desc: "Dashboard de analytics limpio e intuitivo para una plataforma B2B de gestión de proyectos con colaboración en tiempo real.",

  accent: "var(--mustard)",
  client: "Integranet",
  role: "Senior UX Designer",
  timeline: "16 semanas",
  team: "8 personas",
  tags: ["B2B", "Data Viz", "Enterprise", "Design System", "Research"],
  problem: "Un dashboard heredado de 2019 con 47 KPIs visibles simultáneamente. Los usuarios pasaban 8 minutos promedio buscando el dato que necesitaban — y el 72% terminaba exportando a Excel para trabajar. El equipo de producto sabía que había un problema, pero no cuál.",

  decisions: [
    { n: "01", t: "Job-to-be-done antes que feature", d: "Entrevisté a 14 PMs reales. Descubrí que el 80% abría el dashboard para responder una sola pregunta: '¿estamos on track?'. Diseñamos toda la home alrededor de esa pregunta." },
    { n: "02", t: "Un vistazo, cinco detalles", d: "Hero card con el health general del portfolio. Debajo, cinco métricas priorizadas por algoritmo según rol del usuario. Todo lo demás: a un click." },
    { n: "03", t: "Design system desde cero", d: "Construí Sprout DS: 68 componentes, tokens semánticos, modo oscuro. Todo documentado en Storybook y adoptado por 3 equipos más." },
    { n: "04", t: "Data viz con restricciones", d: "Solo 4 tipos de chart permitidos. Paleta de 7 colores semánticos (no decorativos). Reglas estrictas para ejes y leyendas. Menos libertad, más claridad." },
  ],
  metrics: [
    { n: "-62%", l: "time-to-insight", d: "de 8 min a 3 min" },
    { n: "+41%", l: "DAU del producto", d: "en 6 meses" },
    { n: "-78%", l: "exports a Excel", d: "la gente se queda dentro" },
    { n: "68", l: "componentes del DS", d: "Sprout Design System" },
    { n: "4★→5★", l: "G2 rating", d: "en ease-of-use" },
    { n: "3 equipos", l: "adoptaron el DS", d: "sin reuniones extra" },
  ],
  learnings: [
    { t: "Un buen dashboard responde preguntas, no muestra datos", d: "El cambio mental más grande del equipo: pasar de 'qué métricas tenemos' a 'qué preguntas hace el usuario'." },
    { t: "Restricción > libertad en data viz", d: "Nos costó defender 'solo 4 tipos de chart' con stakeholders. Pero cada excepción abría la puerta a diez más. Mantenerse firme paga." },
    { t: "Un design system se mide en adopción, no en componentes", d: "Tener 300 componentes que nadie usa es peor que tener 50 que todos usan. Diseñé para la fricción cero del dev." },
  ],
  quote: "Finalmente tenemos un dashboard que no nos obliga a abrir Excel. Mi equipo celebró el día del launch.",
  quoteAuthor: "— M. Stone, Head of PM en Integranet",
  nextHref: "case-ecommerce.html",
  nextTitle: "Rediseño E-commerce",

const CaseHero = () => (
  <section style={{ paddingTop: 60, paddingBottom: 40, position: "relative", overflow: "hidden" }}>
    <ParallaxSticker speed={-0.15} top="18%" left="5%">

      </div>
    </ParallaxSticker>
    <ParallaxSticker speed={-0.2} top="10%" right="6%">
</ParallaxSticker>

    <div className="container-narrow">
      <div className="mono" style={{ marginBottom: 20 }}>
        <a href="index.html" className="link-animated" style={{ color: data.accent }}>← volver al portfolio</a>

      <div className="mono" style={{ color: "var(--ink-mute)", marginBottom: 16, letterSpacing: "0.1em" }}>

            <div className="mono" style={{ color: "var(--ink-mute)", fontSize: 10, letterSpacing: "0.12em", marginBottom: 6 }}>{k}</div>
            <div style={{ fontFamily: "var(--font-serif)", fontSize: 18, fontWeight: 500 }}>{v}</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)" }}>{s}</div>
          </div>

        {data.tags.map(t => <span key={t} className="tag">{t}</span>)}
      </div>
    </div>

);

  <section className="tight">
    <div className="container">
      <div className="reveal" style={{
        aspectRatio: "16/9", borderRadius: 24,
        backgroundImage: "url(assets/work/saas.svg)",
        backgroundSize: "cover",
        backgroundPosition: "center",
        position: "relative", overflow: "hidden", boxShadow: "var(--shadow-card)",
      }}>
        <WashiTape width={180} rotate={-8} style={{ position: "absolute", top: 16, left: 20 }} />
      </div>
    </div>
  </section>
);

const Challenge = () => (
  <section style={{ background: "var(--cream)" }}>
    <div className="container-narrow">
      <div className="reveal">
        <div className="mono" style={{ color: data.accent, marginBottom: 14 }}>① EL PROBLEMA</div>
        <h2 style={{ marginBottom: 28 }}>47 KPIs, 0 respuestas</h2>
        <p style={{ fontSize: 19, lineHeight: 1.65, color: "var(--ink-soft)" }}>{data.problem}</p>
        <div style={{
          background: "#fff", padding: 36, borderRadius: 20,
          marginTop: 40, boxShadow: "var(--shadow-card)", position: "relative",
        }}>
          <WashiTape width={100} rotate={-5} style={{ position: "absolute", top: -12, left: 40 }} />
          <div className="mono" style={{ color: data.accent, marginBottom: 12 }}>— PREGUNTA GUÍA</div>
          <p style={{ fontFamily: "var(--font-hand)", fontSize: 36, lineHeight: 1.2, margin: 0 }}>{data.question}</p>
        </div>
      </div>
    </div>
  </section>
);

const Decisions = () => (
  <section style={{ position: "relative", overflow: "hidden" }}>
    <ParallaxSticker speed={-0.1} top="8%" right="5%">
      <LeafSticker size={50} color="var(--olive)" rotate={20} />
    </ParallaxSticker>
    <div className="container-narrow">
      <div className="reveal" style={{ marginBottom: 48 }}>
        <div className="mono" style={{ color: data.accent, marginBottom: 14 }}>② DECISIONES</div>
        <h2>Cuatro <span style={{ color: data.accent }}>decisiones</span> que movieron la aguja</h2>
      </div>
      <div style={{ display: "grid", gap: 20 }}>
        {data.decisions.map((d, i) => (
          <div key={d.n} className="reveal" style={{
            background: "#fff", padding: 32, borderRadius: 18,
            display: "grid", gridTemplateColumns: "80px 1fr", gap: 28,
            boxShadow: "var(--shadow-card)", transitionDelay: `${i * 80}ms`,
          }}>
            <div style={{ fontFamily: "var(--font-hand)", fontSize: 72, color: data.accent, lineHeight: 0.9, fontWeight: 500 }}>{d.n}</div>
            <div>
              <h3 style={{ fontSize: 30, marginBottom: 10 }}>{d.t}</h3>
              <p style={{ fontSize: 16, color: "var(--ink-soft)", margin: 0 }}>{d.d}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  </section>
);

const Gallery = () => (
  <section style={{ background: "var(--cream)" }}>
    <div className="container">
      <div className="reveal" style={{ textAlign: "center", marginBottom: 48 }}>
        <div className="mono" style={{ color: data.accent, marginBottom: 14 }}>③ PROTOTIPO</div>
        <h2>El <span style={{ color: data.accent }}>resultado</span></h2>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 28 }}>
        {[
          { t: "home del dashboard", r: -2 },
          { t: "vista de proyecto detallado", r: 2 },
          { t: "tokens del design system", r: -1 },
        ].map((p, i) => (
          <div key={i} className="reveal polaroid" style={{ transform: `rotate(${p.r}deg)`, transitionDelay: `${i * 70}ms` }}>

              <svg width="80" height="50" viewBox="0 0 80 50" fill="none">
                <rect x="2" y="2" width="76" height="46" rx="4" stroke="#fff" strokeWidth="1.2"/>
              </svg>
              <div style={{ fontSize: 10, color: "#fff", marginTop: 8 }}>MOCKUP DESKTOP</div>
            </div>
            <div className="caption">{p.t}</div>
          </div>
        ))}
      </div>
    </div>
  </section>
);

const Results = () => (
  <section style={{ background: "var(--olive-deep)", color: "var(--cream)", position: "relative", overflow: "hidden" }}>
    <div className="sticker" style={{ top: 30, left: "5%" }}>

    <div className="sticker" style={{ bottom: 30, right: "5%" }}>

    </div>
    <div className="container">
      <div className="reveal" style={{ textAlign: "center", marginBottom: 56 }}>
        <div className="mono" style={{ color: "var(--mustard-soft)", marginBottom: 14 }}>④ RESULTADOS</div>
        <h2 style={{ color: "var(--cream)" }}>El <span style={{ color: "var(--mustard-soft)" }}>impacto</span> real</h2>
        <p style={{ fontSize: 18, color: "rgba(244,237,224,0.85)", marginTop: 16, maxWidth: 600, margin: "16px auto 0" }}>
          Medido 6 meses después del rollout. Benchmarks internos de Amplitude.
        </p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 24 }}>
        {data.metrics.map((m, i) => (
          <div key={i} className="reveal" style={{
            background: "rgba(250,245,234,0.08)", backdropFilter: "blur(6px)",
            border: "1px solid rgba(250,245,234,0.15)", padding: 28, borderRadius: 18,
            transitionDelay: `${i * 70}ms`,
          }}>
            <div style={{ fontFamily: "var(--font-hand)", fontSize: 64, color: "var(--mustard-soft)", lineHeight: 0.95, fontWeight: 500 }}>{m.n}</div>
            <div style={{ fontFamily: "var(--font-serif)", fontSize: 18, fontWeight: 500, marginTop: 6, marginBottom: 8 }}>{m.l}</div>
            <div className="mono" style={{ fontSize: 11, color: "rgba(244,237,224,0.7)" }}>{m.d}</div>
          </div>
        ))}
      </div>
    </div>
  </section>
);

const Learnings = () => (

    <div className="container-narrow">
      <div className="reveal">
        <div className="mono" style={{ color: data.accent, marginBottom: 14 }}>⑤ REFLEXIONES</div>
        <h2 style={{ marginBottom: 28 }}>Lo que me llevo</h2>
        <div style={{ display: "grid", gap: 24 }}>
          {data.learnings.map((l, i) => (
            <div key={i} className="reveal" style={{
              display: "grid", gridTemplateColumns: "28px 1fr", gap: 18, alignItems: "start",
              transitionDelay: `${i * 70}ms`,

              <LeafSticker size={28} color="var(--olive)" rotate={i * 20} />
              <div>
                <h3 style={{ fontSize: 26, marginBottom: 6, lineHeight: 1.15 }}>{l.t}</h3>
                <p style={{ fontSize: 15.5, color: "var(--ink-soft)", margin: 0 }}>{l.d}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </section>
);

const Quote = () => (
  <section style={{ background: "var(--cream)", textAlign: "center" }}>
    <div className="container-narrow reveal">
      <div style={{ fontFamily: "var(--font-hand)", fontSize: 100, color: data.accent, lineHeight: 0.5 }}>"</div>
      <p style={{ fontFamily: "var(--font-hand)", fontSize: 36, lineHeight: 1.25, margin: "0 0 24px" }}>{data.quote}</p>
      <div className="mono" style={{ fontSize: 12, color: "var(--ink-mute)" }}>{data.quoteAuthor}</div>
    </div>
  </section>
);

const Next = () => (
  <section style={{ textAlign: "center" }}>
    <div className="container-narrow reveal">
      <div className="mono" style={{ color: data.accent, marginBottom: 16 }}>SIGUIENTE PROYECTO</div>
      <a href={data.nextHref} className="link-animated" style={{ fontFamily: "var(--font-serif)", fontSize: 56, fontWeight: 500, letterSpacing: "-0.03em", color: "var(--ink)" }}>
        {data.nextTitle} →
      </a>
      <div style={{ marginTop: 40 }}>
        <a href="index.html#work" className="link-animated" style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--ink-soft)" }}>← ver todos los trabajos</a>
      </div>
    </div>
  </section>
);

const App = () => {
  useReveal();
  return (
    <>
      <CursorSticker />
      <Nav active="work" />
      <CaseHero />
      <HeroImage />
      <Challenge />
      <Decisions />
      <Gallery />
      <Results />
      <Learnings />
      <Quote />
      <Next />
      <Footer />
      <TweaksPanel />
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
