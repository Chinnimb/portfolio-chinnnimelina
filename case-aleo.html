const Gallery = ({ c }) => {
  const [current, setCurrent] = React.useState(0);
  const [fading, setFading] = React.useState(false);

  React.useEffect(() => {
    const timer = setInterval(() => {
      setFading(true);
      setTimeout(() => {
        setCurrent(i => (i + 1) % SLIDES.length);
        setFading(false);
      }, 400);
    }, 2500);
    return () => clearInterval(timer);
  }, []);

  const goTo = (i) => {
    setFading(true);
    setTimeout(() => { setCurrent(i); setFading(false); }, 300);
  };

  return (
    <section style={{ background: "var(--cream)", overflow: "hidden" }}>
      <div className="container">
        <div className="reveal" style={{ textAlign: "center", marginBottom: 48 }}>
          <div className="mono" style={{ color: "var(--ink-mute)", marginBottom: 16, letterSpacing: "0.15em" }}>{c.gallery}</div>
          <h2>El brandbook en detalle</h2>
        </div>

        {/* Slideshow */}
        <div style={{ maxWidth: 860, margin: "0 auto" }}>
          <div className="polaroid" style={{ padding: "12px 12px 20px", transform: "rotate(-0.5deg)" }}>
            <div style={{ position: "relative", overflow: "hidden", borderRadius: 2 }}>
              <img
                src={SLIDES[current]}
                alt={`ALEO slide ${current + 1}`}
                style={{
                  width: "100%", display: "block",
                  transition: "opacity 0.4s ease",
                  opacity: fading ? 0 : 1,
                }}
              />
            </div>
          </div>

          {/* Counter + arrows — una sola fila centrada */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 20, marginTop: 20 }}>
            <button
              onClick={() => goTo((current - 1 + SLIDES.length) % SLIDES.length)}
              style={{
                background: "none", border: "none", cursor: "pointer",
                fontFamily: "var(--font-mono)", fontSize: 18,
                color: "var(--ink-soft)", padding: 0, lineHeight: 1,
                opacity: 0.7, transition: "opacity 0.2s",
              }}
              onMouseEnter={e => e.currentTarget.style.opacity = 1}
              onMouseLeave={e => e.currentTarget.style.opacity = 0.7}
            >←</button>
            <span style={{
              fontFamily: "var(--font-mono)", fontSize: 11,
              color: "var(--ink-mute)", letterSpacing: "0.1em",
            }}>
              {current + 1} / {SLIDES.length}
            </span>
            <button
              onClick={() => goTo((current + 1) % SLIDES.length)}
              style={{
                background: "none", border: "none", cursor: "pointer",
                fontFamily: "var(--font-mono)", fontSize: 18,
                color: "var(--ink-soft)", padding: 0, lineHeight: 1,
                opacity: 0.7, transition: "opacity 0.2s",
              }}
              onMouseEnter={e => e.currentTarget.style.opacity = 1}
              onMouseLeave={e => e.currentTarget.style.opacity = 0.7}
            >→</button>
          </div>

          {/* Dots */}
          <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 16, flexWrap: "wrap" }}>
            {SLIDES.map((_, i) => (
              <button key={i} onClick={() => goTo(i)} style={{
                width: i === current ? 20 : 8, height: 8, borderRadius: 100,
                background: i === current ? "var(--rust)" : "var(--sage)",
                border: "none", cursor: "pointer", padding: 0,
                transition: "all 0.3s ease",
              }} />
            ))}
          </div>
        </div>
      </div>
    </section>
  );
};
