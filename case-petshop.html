  .laptop-trackpad {
    width: 140px;
    height: 76px;
    background: linear-gradient(180deg, #C6C6C8 0%, #BEBEC0 100%);
    border-radius: 10px;
    margin: 0 auto;
    border: 1px solid rgba(0,0,0,0.1);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.4);

    position: relative;
  }

  }
  @keyframes pageScroll {
    0%   { transform: translateY(0); }
    8%   { transform: translateY(0); }
    88%  { transform: translateY(calc(-100% + 480px)); }
